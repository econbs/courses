<!DOCTYPE html>
<!--
================================================================
  ECO 1000 — SYLLABUS (PDF embed)
  Hosted: www.brandonsheridan.com/courses/eco1000/syllabus.html

  Renders eco1000-syllabus.pdf inline. To update the syllabus:
    1. Edit eco1000_syllabus.tex (source of truth) and recompile:
       pdflatex eco1000_syllabus.tex
    2. Copy the resulting PDF over eco1000-syllabus.pdf in this folder.
    3. Commit and push — no HTML changes needed.

  The interactive HTML version this page replaced is preserved in git
  history (see the commit before this one) in case you want it back.
================================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Course syllabus (PDF) for ECO 1000 at Elon University.">
  <title>ECO 1000 · Syllabus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <style>
    :root {
      --navy:  #14304d;
      --steel: #3b6ea5;
      --steel-dk: #2c5580;
      --cream: #fafbfc;
      --white: #ffffff;
      --font:  'Roboto', Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: var(--font); background: var(--cream); }

    .screen-header {
      background: var(--navy);
      border-bottom: 4px solid var(--steel);
      padding: 1rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.75rem;
    }
    .header-left { display: flex; flex-direction: column; gap: 0.2rem; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.7); text-decoration: none;
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0.08em;
      text-transform: uppercase; transition: color 0.15s;
    }
    .back-link:hover { color: var(--white); }
    .back-link svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; }
    .screen-title { font-size: 1.1rem; font-weight: 700; color: var(--white); }

    .btn-download {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--steel); color: var(--white);
      border: none; padding: 0.55rem 1.1rem;
      font-family: var(--font); font-size: 0.82rem; font-weight: 700;
      border-radius: 5px; cursor: pointer; letter-spacing: 0.02em;
      text-decoration: none; transition: background 0.15s; white-space: nowrap;
    }
    .btn-download:hover { background: var(--steel-dk); }
    .btn-download svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    .pdf-wrap { height: calc(100vh - 68px); width: 100%; }
    .pdf-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    .fallback {
      max-width: 480px; margin: 3rem auto; text-align: center;
      font-size: 0.9rem; color: #444; line-height: 1.6; padding: 0 1.5rem;
    }
    .fallback a { color: var(--steel-dk); font-weight: 600; }

    @media (max-width: 600px) {
      .screen-header { padding: 0.85rem 1rem; }
      .screen-title { font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="screen-header">
  <div class="header-left">
    <a class="back-link" id="syl-back" href="index.html" target="_top">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Course Home
    </a>
    <span class="screen-title" id="syl-title">Syllabus</span>
  </div>
  <a class="btn-download" id="syl-download" href="#" download>
    <svg viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Download PDF
  </a>
</div>

<div class="pdf-wrap">
  <iframe id="syl-pdf-frame" title="ECO 1000 Syllabus PDF"></iframe>
</div>

<noscript>
  <div class="fallback">
    <p><a href="eco1000-syllabus.pdf">Open the syllabus PDF</a>.</p>
  </div>
</noscript>

<script>
  const pdfUrl = CONFIG.pages.syllabusPdf;
  document.getElementById('syl-title').textContent = CONFIG.course.code + ' Syllabus · ' + CONFIG.course.semester;
  document.getElementById('syl-download').href = pdfUrl;
  document.getElementById('syl-pdf-frame').src = pdfUrl;
</script>

</body>
</html>
