<!DOCTYPE html>
<!--
================================================================
  ECO 1000 — WEEKLY SCHEDULE / CHECKLIST
  Hosted: www.brandonsheridan.com/courses/eco1000/checklist.html
  Reads SCHEDULE.weeks from config.js and auto-highlights the
  current week based on today's date. Edit weeks in config.js.
================================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Schedule · ECO 1000</title>
  <link rel="stylesheet" href="https://www.brandonsheridan.com/courses/shared/brand.css">
  <script src="config.js"></script>
  <style>
    .week-card {
      background: var(--white); border-radius: var(--radius-card); box-shadow: var(--shadow);
      padding: 1.25rem 1.5rem; margin-bottom: 1rem; border-left: 4px solid var(--accent);
    }
    .week-card.current-week { border-left-color: var(--primary); background: var(--smoke); }
    .week-head { display: flex; align-items: baseline; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .week-num { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--primary); }
    .week-dates { font-size: 0.78rem; color: var(--muted); }
    .week-current-badge {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      background: var(--primary); color: var(--white); padding: 0.15rem 0.55rem; border-radius: 4px;
    }
    .week-topic { font-size: 0.95rem; font-weight: 500; color: var(--text); margin-bottom: 0.5rem; }
    .week-assignments { font-size: 0.83rem; color: var(--muted); margin: 0.25rem 0 0 1.1rem; }
    .week-assignments li { margin-bottom: 0.15rem; }
    .week-note { font-size: 0.8rem; color: var(--accent-link); margin-top: 0.5rem; }
    .week-exam { font-size: 0.8rem; font-weight: 600; color: #a13c1c; margin-top: 0.5rem; }
  </style>
</head>
<body>

<a class="skip-link" href="#main">Skip to main content</a>

<header>
  <div class="header-inner">
    <a class="back-link" href="index.html" target="_top">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      Course Home
    </a>
    <p class="course-code" id="courseCode"></p>
    <h1>Weekly Schedule</h1>
  </div>
</header>

<main id="main">
  <div id="scheduleList"></div>
</main>

<footer>
  <a id="canvasFooterLink" href="#" target="_top">Return to Canvas</a>
</footer>

<script>
  const { course, schedule, pages } = CONFIG;
  document.getElementById('courseCode').textContent = `${course.code} · ${course.semester}`;

  const weeks = schedule.weeks;
  const today = new Date();

  document.getElementById('scheduleList').innerHTML = weeks.map((w, i) => {
    const start = w.weekStart;
    const nextStart = weeks[i + 1] ? weeks[i + 1].weekStart : null;
    const isCurrent = nextStart ? (today >= start && today < nextStart) : (today >= start);
    const assignments = (w.assignments && w.assignments.length)
      ? `<ul class="week-assignments">${w.assignments.map(a => `<li>${a}</li>`).join('')}</ul>`
      : '';
    return `
      <div class="week-card ${isCurrent ? 'current-week' : ''}">
        <div class="week-head">
          <span class="week-num">${w.label}</span>
          <span class="week-dates">${w.dateRange}</span>
          ${isCurrent ? '<span class="week-current-badge">This Week</span>' : ''}
        </div>
        <div class="week-topic">${w.topic}</div>
        ${assignments}
        ${w.note ? `<div class="week-note">${w.note}</div>` : ''}
        ${w.examNote ? `<div class="week-exam">⚠ ${w.examNote}</div>` : ''}
      </div>
    `;
  }).join('');

  document.getElementById('canvasFooterLink').href = pages.canvasHome;
</script>

</body>
</html>
